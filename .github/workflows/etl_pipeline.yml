name: AC Milan ETL Pipeline Logic Test

# This tells GitHub to run the script every time you push code
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Use a virtual Ubuntu Linux server
    runs-on: ubuntu-latest

    steps:
    # 1. Copy the code from your repo to the virtual server
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Install Python 3.10
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install the libraries listed in your requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run the actual pipeline to make sure there are no errors
    - name: Run ETL Pipeline
      run: |
        python scripts/etl_pipeline.py

    # 5. Check if the database was actually created (Verification)
    - name: Verify Output
      run: |
        if [ -f "database/ac_milan.db" ]; then
          echo "✅ Database created successfully!"
        else
          echo "❌ Database not found!"
          exit 1
        fi